# Publish a release straight from a pushed tag, on GitHub's own infrastructure. Pushing a vX.Y.Z tag on this branch is
# all it takes. The mod ships two Minecraft families that live on separate branches (the 26.x family here, the 1.21.x
# family on its own branch, because they need incompatible toolchains), but they share one version and one release. So
# this workflow builds BOTH branches - each with its own JDK - attaches a signed SLSA build-provenance attestation to
# every jar, composes the release notes from the matching README changelog entry plus a per-family download/verify
# footer, and creates a single GitHub Release with all the jars attached. Anyone can then verify a published jar really
# is the compilation of this public repo with:
#
#   gh attestation verify <the-jar> --repo Moncef-dev/builders-shulkers
#
# The notes come from the changelog you already wrote in README.md (kept identical on both branches), so there is no
# separate "publish" step. A tag with a pre-release suffix (e.g. v1.2.0-beta) is published as a pre-release, not latest.
# The 1.21.x family branch must be pushed to the remote before the tag, since this workflow checks it out by name.
name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write      # create the release and upload the jar assets
  id-token: write      # OIDC token used to sign the provenance attestation
  attestations: write  # store the attestation on the repository

jobs:
  release:
    runs-on: ubuntu-24.04
    env:
      # The branch carrying the OTHER Minecraft family. Edit if it is renamed.
      FAMILY_1_21_X_BRANCH: 1.21.9-1.21.11
    steps:
      - name: checkout the release tag (26.x family)
        uses: actions/checkout@v6

      - name: checkout the 1.21.x family branch
        uses: actions/checkout@v6
        with:
          ref: ${{ env.FAMILY_1_21_X_BRANCH }}
          path: family-1.21.x

      - name: validate gradle wrappers
        uses: gradle/actions/wrapper-validation@v6

      # 26.x compiles on Java 25, 1.21.x on Java 21. Install both; each build references its JDK by the JAVA_HOME_<v>_X64
      # env var that setup-java exports, so neither depends on which JDK happens to be the default JAVA_HOME.
      - name: setup jdk 21
        uses: actions/setup-java@v5
        with:
          java-version: '21'
          distribution: 'microsoft'
      - name: setup jdk 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'microsoft'

      - name: build the 26.x jars (Java 25)
        run: |
          chmod +x ./gradlew
          JAVA_HOME="$JAVA_HOME_25_X64" ./gradlew build

      - name: build the 1.21.x jars (Java 21)
        run: |
          chmod +x ./family-1.21.x/gradlew
          ( cd family-1.21.x && JAVA_HOME="$JAVA_HOME_21_X64" ./gradlew build )

      - name: collect the runnable jars
        id: jars
        run: |
          # Stonecutter builds one jar per Minecraft version under <root>/versions/<mc>/build/libs. Gather the runnable
          # jars (dropping the -sources and -dev variants) from both families into one folder, and FAIL if either family
          # produced none - so a silently empty build can never publish a half release.
          mkdir -p dist
          drop='-(sources|dev)\.jar$'
          jars_26x=$(ls versions/*/build/libs/*.jar 2>/dev/null | grep -vE -- "$drop" || true)
          jars_1121=$(ls family-1.21.x/versions/*/build/libs/*.jar 2>/dev/null | grep -vE -- "$drop" || true)
          if [ -z "$jars_26x" ]; then echo "no runnable 26.x jars under versions/*/build/libs" >&2; exit 1; fi
          if [ -z "$jars_1121" ]; then echo "no runnable 1.21.x jars under family-1.21.x/versions/*/build/libs" >&2; exit 1; fi
          cp $jars_26x $jars_1121 dist/
          jars=$(ls dist/*.jar)
          echo "Selected jars:"; echo "$jars"
          {
            echo "paths<<JARS_EOF"
            echo "$jars"
            echo "JARS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: generate build provenance attestations
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: ${{ steps.jars.outputs.paths }}

      - name: compose release notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Per-family "Requires" lines: the Minecraft range (supported_minecraft) and the Java release target
          # (options.release.set) are read from each family's own files, so the footer stays correct as they evolve.
          mc_26x=$(sed -nE 's/^supported_minecraft=//p' gradle.properties)
          mc_1121=$(sed -nE 's/^supported_minecraft=//p' family-1.21.x/gradle.properties)
          java_26x=$(grep -oE 'release\.set\([0-9]+\)' build.gradle.kts | grep -oE '[0-9]+' | head -1)
          java_1121=$(grep -oE 'release\.set\([0-9]+\)' family-1.21.x/build.gradle.kts | grep -oE '[0-9]+' | head -1)
          if [ -z "$mc_26x" ] || [ -z "$mc_1121" ] || [ -z "$java_26x" ] || [ -z "$java_1121" ]; then
            echo "missing supported_minecraft or Java target for one of the families" >&2; exit 1
          fi
          # The version TOKENS in the jar filenames (a jar is named for its family). The reader substitutes the one from
          # the jar they downloaded into the verify command.
          jar_mc=$(ls dist/*.jar | sed -E 's#.*-fabric-(.+)\.jar$#\1#' | sort -u | sed ':a;N;$!ba;s/\n/, /g')
          notes="$RUNNER_TEMP/notes.md"
          # Changelog body for this version: the lines between "### <version>" and its "** **" separator in README.md.
          # The $(...) capture strips trailing blank lines, so the footer always follows after exactly one blank line.
          body=$(awk -v hdr="### $version" '$0==hdr{c=1;next} c&&$0=="** **"{exit} c{print}' README.md)
          {
            printf '%s\n\n' "$body"
            printf 'Requires Fabric Loader and Fabric API. Download the jar for your Minecraft version and put it with Fabric API in your `mods` folder:\n'
            printf -- '- Minecraft %s: Java %s.\n' "$mc_26x" "$java_26x"
            printf -- '- Minecraft %s: Java %s.\n\n' "$mc_1121" "$java_1121"
            printf 'Each jar is built on GitHub Actions from this release and carries a signed SLSA build-provenance attestation. Verify the jar you downloaded (`<mc_version>` is the version in its filename, one of: %s):\n' "$jar_mc"
            printf '```\n'
            printf 'gh attestation verify builders-shulkers-%s-fabric-<mc_version>.jar --repo Moncef-dev/builders-shulkers\n' "$version"
            printf '```\n'
          } > "$notes"
          echo "----- composed notes -----"; cat "$notes"
          echo "NOTES_PATH=$notes" >> "$GITHUB_ENV"
          # Release title, with an optional subtitle for major versions (release_title in gradle.properties):
          # "Builder's Shulkers <version>", or "Builder's Shulkers <version>: <release_title>" when set.
          release_title=$(sed -nE 's/^release_title=//p' gradle.properties)
          release_name="Builder's Shulkers $version"
          if [ -n "$release_title" ]; then release_name="$release_name: $release_title"; fi
          echo "RELEASE_NAME=$release_name" >> "$GITHUB_ENV"

      - name: create the release with all jars
        uses: softprops/action-gh-release@v3
        with:
          name: ${{ env.RELEASE_NAME }}
          body_path: ${{ env.NOTES_PATH }}
          files: ${{ steps.jars.outputs.paths }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ !contains(github.ref_name, '-') }}
