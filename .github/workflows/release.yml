# Publish a release straight from a pushed tag, on GitHub's own infrastructure. Pushing a vX.Y.Z tag is all it takes:
# this workflow checks out that tag, builds one jar per Minecraft version, attaches a signed SLSA build-provenance
# attestation to each, composes the release notes from the matching README changelog entry plus a download/verify
# footer, and creates the GitHub Release with both jars attached. Anyone can then verify a published jar really is the
# compilation of this public repo at that tag, with:
#
#   gh attestation verify <the-jar> --repo Moncef-dev/builders-shulkers
#
# The notes come from the changelog you already wrote in README.md, so there is no separate "publish" step. A tag that
# carries a pre-release suffix (e.g. v1.2.0-beta) is published as a pre-release and is not marked latest.
name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write      # create the release and upload the jar assets
  id-token: write      # OIDC token used to sign the provenance attestation
  attestations: write  # store the attestation on the repository

jobs:
  release:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout the release tag
        uses: actions/checkout@v6

      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v6

      - name: setup jdk
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'microsoft'

      - name: make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: build
        run: ./gradlew build

      - name: identify the runnable jars
        id: jars
        run: |
          # Stonecutter builds one jar per Minecraft version under versions/<mc>/build/libs.
          # Keep the runnable jars, drop the -sources and -dev variants.
          jars=$(ls versions/*/build/libs/*.jar | grep -vE -- '-(sources|dev)\.jar$')
          if [ -z "$jars" ]; then echo "no runnable jars found in versions/*/build/libs" >&2; exit 1; fi
          echo "Selected jars:"; echo "$jars"
          {
            echo "paths<<JARS_EOF"
            echo "$jars"
            echo "JARS_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: generate build provenance attestations
        uses: actions/attest-build-provenance@v3
        with:
          subject-path: ${{ steps.jars.outputs.paths }}

      - name: compose release notes
        run: |
          version="${GITHUB_REF_NAME#v}"
          # Supported Minecraft versions, derived from the runnable jar names
          # (builders-shulkers-<version>-fabric-<mc>.jar), joined with " or " (e.g. "26.1.2 or 26.2").
          mc_list=$(ls versions/*/build/libs/*.jar | grep -vE -- '-(sources|dev)\.jar$' \
                    | sed -E 's#.*-fabric-(.+)\.jar$#\1#' | sort -u | sed ':a;N;$!ba;s/\n/ or /g')
          notes="$RUNNER_TEMP/notes.md"
          # Changelog body for this version: the lines between "### <version>" and its "** **" separator in README.md.
          # The $(...) capture strips trailing blank lines, so the footer always follows after exactly one blank line.
          body=$(awk -v hdr="### $version" '$0==hdr{c=1;next} c&&$0=="** **"{exit} c{print}' README.md)
          # Invariant download/verify footer. <mc_version> is a literal placeholder the reader substitutes.
          {
            printf '%s\n\n' "$body"
            printf 'Requires Minecraft %s with Fabric Loader, Fabric API, and Java 25. Put the jar for your Minecraft version (`builders-shulkers-%s-fabric-<mc_version>.jar`) and Fabric API in your `mods` folder.\n\n' "$mc_list" "$version"
            printf 'The jar is built on GitHub Actions from this tag and carries a signed SLSA build-provenance attestation:\n'
            printf '```\n'
            printf 'gh attestation verify builders-shulkers-%s-fabric-<mc_version>.jar --repo Moncef-dev/builders-shulkers\n' "$version"
            printf '```\n'
          } > "$notes"
          echo "----- composed notes -----"; cat "$notes"
          echo "NOTES_PATH=$notes" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=$version" >> "$GITHUB_ENV"

      - name: create the release with both jars
        uses: softprops/action-gh-release@v3
        with:
          name: Builder's Shulkers ${{ env.RELEASE_VERSION }}
          body_path: ${{ env.NOTES_PATH }}
          files: ${{ steps.jars.outputs.paths }}
          prerelease: ${{ contains(github.ref_name, '-') }}
          make_latest: ${{ !contains(github.ref_name, '-') }}
