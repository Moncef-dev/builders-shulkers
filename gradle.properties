# Done to increase the memory available to gradle.
org.gradle.jvmargs=-Xmx2G
org.gradle.parallel=true

# IntelliJ IDEA is not yet fully compatible with configuration cache, see: https://github.com/FabricMC/fabric-loom/issues/1349
org.gradle.configuration-cache=false

# Mod Properties
mod_version=1.2.0
# Minecraft versions the release supports, for the GitHub release footer. Edit per release: a single jar can cover a
# whole patch family (the 26.1.2 jar runs on all of 26.1.x), which the jar name alone does not show.
supported_minecraft=26.1.x or 26.2
# Optional subtitle for the GitHub release title ("Builder's Shulkers <version>: <release_title>"). Set it for a major
# release, leave it empty for a plain version title.
release_title=Customization
maven_group=io.github.moncefdev.shulkerinventory
